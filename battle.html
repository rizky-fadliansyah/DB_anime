<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Battles Arena - Layar Duel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <h1>🏟️ VS Battles Arena</h1>
        <p class="subtitle">Layar Simulasi Pertarungan AI</p>

        <div class="nav-header">
            <h2>Layar Pertarungan</h2>
            <button class="btn-page secondary" onclick="window.location.href='index.html'">⬅️ KEMBALI LIHAT CHAR</button>
        </div>

        <div class="selection-container">
            <div class="slot">
                <div class="p1-label">Petarung 1</div>
                <div class="slot-name" id="status-p1" style="color: #ff0055;">Memuat...</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="slot">
                <div class="p2-label">Petarung 2</div>
                <div class="slot-name" id="status-p2" style="color: #00ff55;">Memuat...</div>
            </div>
        </div>

        <button class="btn-battle" id="btn-action">MULAI DUEL MAKSIMAL! ⚔️</button>

        <div id="loading" style="display: none; text-align: center; margin: 20px 0; color: #ffc107; font-weight: bold;">
            Memproses Analisis Form Spesifik dari VS Battles Wiki...
        </div>

        <div class="battle-arena-container" id="arena-result" style="display: none;">
            
            <div class="fighter-column p1-column">
                <div class="card-fighter">
                    <h3 id="f1-name">Name 1</h3>
                    <div class="tier-text" id="f1-tier">Tier</div>
                    
                    <div class="avatar-wrapper">
                        <img src="" id="f1-img" class="arena-avatar p1-border" alt="P1">
                    </div>
                    
                    <div id="f1-stats"></div>
                    
                    <div class="desc-box-side">
                        <h4>Kondisi & Profil:</h4>
                        <p id="f1-desc"></p>
                    </div>
                </div>
            </div>

            <div class="analysis-column">
                <div class="versus-title">VS</div>
                
                <div class="result-center-box">
                    <div class="winner-announcement">
                        <h3>HASIL AKHIR</h3>
                        <strong id="battle-winner">JUARA: ?</strong>
                    </div>
                    
                    <div class="reason-box">
                        <h4>Analisis Taktis AI:</h4>
                        <p id="battle-reason"></p>
                    </div>
                </div>
            </div>

            <div class="fighter-column p2-column">
                <div class="card-fighter">
                    <h3 id="f2-name">Name 2</h3>
                    <div class="tier-text" id="f2-tier">Tier</div>
                    
                    <div class="avatar-wrapper">
                        <img src="" id="f2-img" class="arena-avatar p2-border" alt="P2">
                    </div>
                    
                    <div id="f2-stats"></div>
                    
                    <div class="desc-box-side">
                        <h4>Kondisi & Profil:</h4>
                        <p id="f2-desc"></p>
                    </div>
                </div>
            </div>

        </div> </div>

    <script src="battle.js"></script>
</body>
</html>
